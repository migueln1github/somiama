<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora SOFA — SOMIAMA</title>
<style>
  :root {
    --bg: #f6f8f9;
    --panel: #ffffff;
    --line: #e2e8ec;
    --ink: #1c2b33;
    --ink-soft: #5b6b73;
    --accent: #12877D;
    --accent-soft: #e4f3f4;
    --danger: #b3403a;
    --danger-soft: #fbeceb;
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: 32px 16px 80px;
  }
  .wrap { max-width: 960px; margin: 0 auto; }

  header.top {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 8px;
  }
  header.top h1 { font-size: 22px; font-weight: 600; margin: 0; letter-spacing: -0.2px; }
  header.top p { margin: 0; font-size: 13px; color: var(--ink-soft); }

  .result-bar {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 20px 24px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 20px;
    margin-bottom: 28px;
    position: sticky;
    top: 12px;
    z-index: 5;
    box-shadow: 0 1px 3px rgba(20,40,45,0.06);
  }
  .result-item .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--ink-soft); margin-bottom: 4px; }
  .result-item .value { font-size: 28px; font-weight: 600; color: var(--accent); line-height: 1; }
  .result-item.mortality .value { color: var(--danger); }

  .section { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); margin-bottom: 16px; overflow: hidden; }
  .section h2 {
    font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--ink-soft); margin: 0; padding: 12px 18px; border-bottom: 1px solid var(--line); background: #fbfcfd;
    display: flex; align-items: center; justify-content: space-between;
  }
  .section h2 .badge {
    font-size: 12px; font-weight: 600; padding: 3px 9px; border-radius: 999px;
    background: #eef1f2; color: var(--ink-soft); text-transform: none; letter-spacing: 0;
  }
  .section h2 .badge.active { background: var(--accent-soft); color: var(--accent); }
  .section h2 .badge.high { background: var(--danger-soft); color: var(--danger); }

  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); }
  .field { padding: 14px 18px; border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); }
  .field label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 8px; }
  .field .hint { font-size: 11px; color: var(--ink-soft); font-weight: 400; display: block; margin-top: 2px; }
  .row { display: flex; gap: 8px; align-items: center; }
  input, select {
    width: 100%; font-size: 14px; padding: 8px 10px; border: 1px solid #d3dade;
    border-radius: 7px; background: #fff; color: var(--ink); font-family: inherit;
  }
  input:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

  .toggle-row { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .toggle-row button {
    flex: 1; min-width: 90px; font-size: 12px; padding: 6px 4px; border-radius: 6px;
    border: 1px solid #d3dade; background: #fff; color: var(--ink-soft); cursor: pointer;
  }
  .toggle-row button.selected { background: var(--accent); color: #fff; border-color: var(--accent); }

  footer.actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 8px; }
  footer.actions button {
    font-size: 13px; padding: 9px 18px; border-radius: 7px; border: 1px solid #d3dade;
    background: #fff; color: var(--ink); cursor: pointer;
  }
  footer.actions button:hover { background: #f1f4f5; }

  a.back { font-size: 12px; color: var(--ink-soft); text-decoration: none; }
  a.back:hover { color: var(--accent); }

  @media (max-width: 560px) { .field { border-right: none; } }
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <div>
      <a class="back" href="/herramientas">← Herramientas Clínicas</a>
      <h1 style="margin-top:6px;">Score SOFA</h1>
      <p>Sequential Organ Failure Assessment</p>
    </div>
  </header>

  <div class="result-bar">
    <div class="result-item">
      <div class="label">SOFA total</div>
      <div class="value" id="out-total">0</div>
    </div>
    <div class="result-item">
      <div class="label">Órganos afectados (&gt;0)</div>
      <div class="value" id="out-organs">0/6</div>
    </div>
    <div class="result-item mortality">
      <div class="label">Mortalidad orientativa</div>
      <div class="value" id="out-mortality">—</div>
    </div>
  </div>

  <div class="section">
    <h2>Respiratorio <span class="badge" id="badge-resp">0 pts</span></h2>
    <div class="grid">
      <div class="field">
        <label>PaO2 (mmHg)</label>
        <div class="row"><input type="number" id="pao2" placeholder="90"></div>
      </div>
      <div class="field">
        <label>FiO2 (fracción, ej. 0.21–1.0)</label>
        <div class="row"><input type="number" step="0.01" id="fio2" placeholder="0.21"></div>
      </div>
      <div class="field">
        <label>Soporte respiratorio
          <span class="hint">Necesario para puntuar 3-4</span>
        </label>
        <div class="toggle-row" id="vent-toggle">
          <button data-v="0" class="selected">Sin soporte</button>
          <button data-v="1">VMI / VNI / alto flujo</button>
        </div>
      </div>
    </div>
  </div>

  <div class="section">
    <h2>Coagulación <span class="badge" id="badge-coag">0 pts</span></h2>
    <div class="grid">
      <div class="field">
        <label>Plaquetas (×10³/µL)</label>
        <div class="row"><input type="number" id="plt" placeholder="200"></div>
      </div>
    </div>
  </div>

  <div class="section">
    <h2>Hepático <span class="badge" id="badge-liver">0 pts</span></h2>
    <div class="grid">
      <div class="field">
        <label>Bilirrubina (mg/dL)</label>
        <div class="row"><input type="number" step="0.1" id="bili" placeholder="1.0"></div>
      </div>
    </div>
  </div>

  <div class="section">
    <h2>Cardiovascular <span class="badge" id="badge-cardio">0 pts</span></h2>
    <div class="grid">
      <div class="field">
        <label>Tensión arterial media (mmHg)
          <span class="hint">Solo si no hay vasopresores</span>
        </label>
        <div class="row"><input type="number" id="map" placeholder="80"></div>
      </div>
      <div class="field">
        <label>Dopamina (µg/kg/min)</label>
        <div class="row"><input type="number" step="0.1" id="dopa" placeholder="0"></div>
      </div>
      <div class="field">
        <label>Dobutamina
          <span class="hint">Cualquier dosis puntúa 2</span>
        </label>
        <div class="toggle-row" id="dobuta-toggle">
          <button data-v="0" class="selected">No</button>
          <button data-v="1">Sí, cualquier dosis</button>
        </div>
      </div>
      <div class="field">
        <label>Adrenalina (µg/kg/min)</label>
        <div class="row"><input type="number" step="0.01" id="epi" placeholder="0"></div>
      </div>
      <div class="field">
        <label>Noradrenalina (µg/kg/min)</label>
        <div class="row"><input type="number" step="0.01" id="norepi" placeholder="0"></div>
      </div>
    </div>
  </div>

  <div class="section">
    <h2>Neurológico <span class="badge" id="badge-cns">0 pts</span></h2>
    <div class="grid">
      <div class="field">
        <label>Escala de Glasgow (GCS)</label>
        <div class="row"><input type="number" min="3" max="15" id="gcs" placeholder="15"></div>
      </div>
    </div>
  </div>

  <div class="section">
    <h2>Renal <span class="badge" id="badge-renal">0 pts</span></h2>
    <div class="grid">
      <div class="field">
        <label>Creatinina (mg/dL)</label>
        <div class="row"><input type="number" step="0.1" id="creat" placeholder="1.0"></div>
      </div>
      <div class="field">
        <label>Diuresis (mL/24h)
          <span class="hint">Opcional — puntúa si es más grave que la creatinina</span>
        </label>
        <div class="row"><input type="number" id="urine" placeholder="ej. 1500"></div>
      </div>
    </div>
  </div>

  <footer class="actions">
    <button id="reset-btn">Reiniciar</button>
  </footer>

</div>

<script>
(function(){
  const num = id => {
    const v = document.getElementById(id).value;
    return v === '' ? null : parseFloat(v);
  };
  const setBadge = (id, val) => {
    const el = document.getElementById(id);
    el.textContent = val + ' pts';
    el.className = 'badge' + (val >= 3 ? ' high' : (val >= 1 ? ' active' : ''));
  };

  let ventSupport = false;
  let dobutamine = false;

  document.getElementById('vent-toggle').addEventListener('click', e=>{
    const btn = e.target.closest('button'); if(!btn) return;
    ventSupport = btn.dataset.v === '1';
    [...e.currentTarget.children].forEach(b=>b.classList.toggle('selected', b===btn));
    compute();
  });
  document.getElementById('dobuta-toggle').addEventListener('click', e=>{
    const btn = e.target.closest('button'); if(!btn) return;
    dobutamine = btn.dataset.v === '1';
    [...e.currentTarget.children].forEach(b=>b.classList.toggle('selected', b===btn));
    compute();
  });
  document.getElementById('reset-btn').addEventListener('click', ()=>{
    document.querySelectorAll('input').forEach(i=>i.value='');
    ventSupport = false; dobutamine = false;
    document.querySelectorAll('.toggle-row').forEach(row=>{
      [...row.children].forEach((b,i)=>b.classList.toggle('selected', i===0));
    });
    compute();
  });

  function respPts(){
    const pao2 = num('pao2'), fio2 = num('fio2');
    if (pao2===null || fio2===null || fio2<=0) return 0;
    const ratio = pao2 / fio2;
    if (ratio >= 400) return 0;
    if (ratio >= 300) return 1;
    if (ratio >= 200) return 2;
    if (ratio >= 100) return ventSupport ? 3 : 2;
    return ventSupport ? 4 : 2;
  }
  function coagPts(){
    const p = num('plt');
    if (p===null) return 0;
    if (p>=150) return 0; if (p>=100) return 1; if (p>=50) return 2; if (p>=20) return 3; return 4;
  }
  function liverPts(){
    const b = num('bili');
    if (b===null) return 0;
    if (b<1.2) return 0; if (b<2.0) return 1; if (b<6.0) return 2; if (b<12.0) return 3; return 4;
  }
  function cardioPts(){
    const dopa = num('dopa') || 0;
    const epi = num('epi') || 0;
    const norepi = num('norepi') || 0;
    const map = num('map');
    if (dopa > 15 || epi > 0.1 || norepi > 0.1) return 4;
    if ((dopa > 5 && dopa <= 15) || (epi > 0 && epi <= 0.1) || (norepi > 0 && norepi <= 0.1)) return 3;
    if ((dopa > 0 && dopa <= 5) || dobutamine) return 2;
    if (map !== null && map < 70) return 1;
    return 0;
  }
  function cnsPts(){
    const g = num('gcs');
    if (g===null) return 0;
    if (g===15) return 0; if (g>=13) return 1; if (g>=10) return 2; if (g>=6) return 3; return 4;
  }
  function renalPts(){
    const c = num('creat');
    const u = num('urine');
    let p = 0;
    if (c!==null){
      if (c<1.2) p=0; else if (c<2.0) p=1; else if (c<3.5) p=2; else if (c<5.0) p=3; else p=4;
    }
    if (u!==null){
      let pu = 0;
      if (u < 200) pu = 4; else if (u < 500) pu = 3;
      p = Math.max(p, pu);
    }
    return p;
  }

  function compute(){
    const resp = respPts(); setBadge('badge-resp', resp);
    const coag = coagPts(); setBadge('badge-coag', coag);
    const liver = liverPts(); setBadge('badge-liver', liver);
    const cardio = cardioPts(); setBadge('badge-cardio', cardio);
    const cns = cnsPts(); setBadge('badge-cns', cns);
    const renal = renalPts(); setBadge('badge-renal', renal);

    const total = resp + coag + liver + cardio + cns + renal;
    const organs = [resp,coag,liver,cardio,cns,renal].filter(v=>v>0).length;

    document.getElementById('out-total').textContent = total;
    document.getElementById('out-organs').textContent = organs + '/6';

    // Aproximación orientativa (no oficial) solo a modo de referencia visual
    const mortEl = document.getElementById('out-mortality');
    if (total > 0) {
      const logit = -4.2 + (total * 0.32);
      const prob = 1 / (1 + Math.exp(-logit));
      mortEl.textContent = (prob*100).toFixed(1) + '%';
    } else {
      mortEl.textContent = '—';
    }
  }

  document.querySelectorAll('input').forEach(i=>i.addEventListener('input', compute));
  compute();
})();
</script>
</body>
</html>
