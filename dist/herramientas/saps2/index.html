<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora SAPS II — SOMIAMA</title>
<style>
  :root {
    --bg: #f6f8f9; --panel: #ffffff; --line: #e2e8ec; --ink: #1c2b33; --ink-soft: #5b6b73;
    --accent: #12877D; --accent-soft: #e4f3f4; --danger: #b3403a; --danger-soft: #fbeceb; --radius: 10px;
  }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; padding:32px 16px 80px; }
  .wrap { max-width:960px; margin:0 auto; }
  header.top { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:28px; flex-wrap:wrap; gap:8px; }
  header.top h1 { font-size:22px; font-weight:600; margin:0; letter-spacing:-0.2px; }
  header.top p { margin:0; font-size:13px; color:var(--ink-soft); }
  .result-bar {
    background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:20px 24px;
    display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:20px; margin-bottom:28px;
    position:sticky; top:12px; z-index:5; box-shadow:0 1px 3px rgba(20,40,45,0.06);
  }
  .result-item .label { font-size:11px; text-transform:uppercase; letter-spacing:0.6px; color:var(--ink-soft); margin-bottom:4px; }
  .result-item .value { font-size:28px; font-weight:600; color:var(--accent); line-height:1; }
  .result-item.mortality .value { color:var(--danger); }
  .section { background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); margin-bottom:16px; overflow:hidden; }
  .section h2 {
    font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; color:var(--ink-soft);
    margin:0; padding:12px 18px; border-bottom:1px solid var(--line); background:#fbfcfd;
  }
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(210px,1fr)); }
  .field { padding:14px 18px; border-right:1px solid var(--line); border-bottom:1px solid var(--line); }
  .field label { display:block; font-size:13px; font-weight:500; margin-bottom:8px; }
  .field .hint { font-size:11px; color:var(--ink-soft); font-weight:400; display:block; margin-top:2px; }
  .row { display:flex; gap:8px; align-items:center; }
  input, select {
    width:100%; font-size:14px; padding:8px 10px; border:1px solid #d3dade; border-radius:7px;
    background:#fff; color:var(--ink); font-family:inherit;
  }
  input:focus, select:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
  .points-chip {
    min-width:36px; text-align:center; font-size:12px; font-weight:600; padding:6px 8px; border-radius:6px;
    background:#eef1f2; color:var(--ink-soft); white-space:nowrap;
  }
  .points-chip.active { background:var(--accent-soft); color:var(--accent); }
  .points-chip.high { background:var(--danger-soft); color:var(--danger); }
  .toggle-row { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
  .toggle-row button {
    flex:1; min-width:90px; font-size:12px; padding:6px 4px; border-radius:6px; border:1px solid #d3dade;
    background:#fff; color:var(--ink-soft); cursor:pointer;
  }
  .toggle-row button.selected { background:var(--accent); color:#fff; border-color:var(--accent); }
  footer.actions { display:flex; justify-content:flex-end; gap:10px; margin-top:8px; }
  footer.actions button { font-size:13px; padding:9px 18px; border-radius:7px; border:1px solid #d3dade; background:#fff; color:var(--ink); cursor:pointer; }
  footer.actions button:hover { background:#f1f4f5; }
  a.back { font-size:12px; color:var(--ink-soft); text-decoration:none; }
  a.back:hover { color:var(--accent); }
  @media (max-width:560px) { .field { border-right:none; } }
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <div>
      <a class="back" href="/herramientas">← Herramientas Clínicas</a>
      <h1 style="margin-top:6px;">Score SAPS II</h1>
      <p>Simplified Acute Physiology Score II</p>
    </div>
  </header>

  <div class="result-bar">
    <div class="result-item">
      <div class="label">SAPS II total</div>
      <div class="value" id="out-total">0</div>
    </div>
    <div class="result-item mortality">
      <div class="label">Mortalidad estimada</div>
      <div class="value" id="out-mortality">—</div>
    </div>
  </div>

  <div class="section">
    <h2>Ingreso y edad</h2>
    <div class="grid">
      <div class="field">
        <label>Edad (años)</label>
        <div class="row"><input type="number" id="age" placeholder="60"><div class="points-chip" id="pts-age">0</div></div>
      </div>
      <div class="field">
        <label>Tipo de ingreso</label>
        <div class="toggle-row" id="admission-toggle">
          <button data-v="scheduled" class="selected">Q. programada</button>
          <button data-v="medical">Médico</button>
          <button data-v="unscheduled">Q. urgente</button>
        </div>
        <div class="row" style="margin-top:8px; justify-content:flex-end;"><div class="points-chip" id="pts-admission">0</div></div>
      </div>
    </div>
  </div>

  <div class="section">
    <h2>Signos vitales</h2>
    <div class="grid">
      <div class="field">
        <label>Frecuencia cardiaca (lpm)</label>
        <div class="row"><input type="number" id="hr" placeholder="80"><div class="points-chip" id="pts-hr">0</div></div>
      </div>
      <div class="field">
        <label>Tensión arterial sistólica (mmHg)</label>
        <div class="row"><input type="number" id="sbp" placeholder="120"><div class="points-chip" id="pts-sbp">0</div></div>
      </div>
      <div class="field">
        <label>Temperatura (°C)</label>
        <div class="row"><input type="number" step="0.1" id="temp" placeholder="37.0"><div class="points-chip" id="pts-temp">0</div></div>
      </div>
    </div>
  </div>

  <div class="section">
    <h2>Oxigenación y diuresis</h2>
    <div class="grid">
      <div class="field">
        <label>Ventilación mecánica o CPAP
          <span class="hint">Si no, el ratio PaO2/FiO2 no puntúa</span>
        </label>
        <div class="toggle-row" id="vent-toggle">
          <button data-v="0" class="selected">No</button>
          <button data-v="1">Sí</button>
        </div>
      </div>
      <div class="field" id="field-pao2">
        <label>PaO2 (mmHg)</label>
        <div class="row"><input type="number" id="pao2" placeholder="90"></div>
      </div>
      <div class="field" id="field-fio2">
        <label>FiO2 (fracción)</label>
        <div class="row">
          <input type="number" step="0.01" id="fio2" placeholder="0.4">
          <div class="points-chip" id="pts-ox">0</div>
        </div>
      </div>
      <div class="field">
        <label>Diuresis (L/24h)</label>
        <div class="row"><input type="number" step="0.1" id="urine" placeholder="1.5"><div class="points-chip" id="pts-urine">0</div></div>
      </div>
    </div>
  </div>

  <div class="section">
    <h2>Bioquímica y hematología</h2>
    <div class="grid">
      <div class="field">
        <label>Urea / BUN (mg/dL)</label>
        <div class="row"><input type="number" id="urea" placeholder="20"><div class="points-chip" id="pts-urea">0</div></div>
      </div>
      <div class="field">
        <label>Leucocitos (×10³/mm³)</label>
        <div class="row"><input type="number" step="0.1" id="wbc" placeholder="8"><div class="points-chip" id="pts-wbc">0</div></div>
      </div>
      <div class="field">
        <label>Potasio (mmol/L)</label>
        <div class="row"><input type="number" step="0.1" id="k" placeholder="4.0"><div class="points-chip" id="pts-k">0</div></div>
      </div>
      <div class="field">
        <label>Sodio (mmol/L)</label>
        <div class="row"><input type="number" id="na" placeholder="140"><div class="points-chip" id="pts-na">0</div></div>
      </div>
      <div class="field">
        <label>Bicarbonato (mmol/L)</label>
        <div class="row"><input type="number" step="0.1" id="hco3" placeholder="24"><div class="points-chip" id="pts-hco3">0</div></div>
      </div>
      <div class="field">
        <label>Bilirrubina (mg/dL)</label>
        <div class="row"><input type="number" step="0.1" id="bili" placeholder="1.0"><div class="points-chip" id="pts-bili">0</div></div>
      </div>
    </div>
  </div>

  <div class="section">
    <h2>Neurológico y comorbilidad crónica</h2>
    <div class="grid">
      <div class="field">
        <label>Escala de Glasgow (GCS)</label>
        <div class="row"><input type="number" min="3" max="15" id="gcs" placeholder="15"><div class="points-chip" id="pts-gcs">0</div></div>
      </div>
      <div class="field">
        <label>Enfermedad crónica grave</label>
        <div class="toggle-row" id="chronic-toggle">
          <button data-v="none" class="selected">Ninguna</button>
          <button data-v="metastasis">Cáncer metastásico</button>
          <button data-v="hema">Neoplasia hematológica</button>
          <button data-v="aids">SIDA</button>
        </div>
        <div class="row" style="margin-top:8px; justify-content:flex-end;"><div class="points-chip" id="pts-chronic">0</div></div>
      </div>
    </div>
  </div>

  <footer class="actions">
    <button id="reset-btn">Reiniciar</button>
  </footer>

</div>

<script>
(function(){
  const chip = (id, val) => {
    const el = document.getElementById(id);
    el.textContent = val;
    el.className = 'points-chip' + (val >= 8 ? ' high' : (val > 0 ? ' active' : ''));
  };
  const num = id => {
    const v = document.getElementById(id).value;
    return v === '' ? null : parseFloat(v);
  };

  let admission = 'scheduled';
  let ventilated = false;
  let chronic = 'none';

  document.getElementById('admission-toggle').addEventListener('click', e=>{
    const btn = e.target.closest('button'); if(!btn) return;
    admission = btn.dataset.v;
    [...e.currentTarget.children].forEach(b=>b.classList.toggle('selected', b===btn));
    compute();
  });
  document.getElementById('vent-toggle').addEventListener('click', e=>{
    const btn = e.target.closest('button'); if(!btn) return;
    ventilated = btn.dataset.v === '1';
    [...e.currentTarget.children].forEach(b=>b.classList.toggle('selected', b===btn));
    compute();
  });
  document.getElementById('chronic-toggle').addEventListener('click', e=>{
    const btn = e.target.closest('button'); if(!btn) return;
    chronic = btn.dataset.v;
    [...e.currentTarget.children].forEach(b=>b.classList.toggle('selected', b===btn));
    compute();
  });
  document.getElementById('reset-btn').addEventListener('click', ()=>{
    document.querySelectorAll('input').forEach(i=>i.value='');
    admission='scheduled'; ventilated=false; chronic='none';
    document.querySelectorAll('.toggle-row').forEach(row=>{
      [...row.children].forEach((b,i)=>b.classList.toggle('selected', i===0));
    });
    compute();
  });

  function agePts(v){
    if (v===null) return 0;
    if (v<40) return 0; if (v<60) return 7; if (v<70) return 12; if (v<75) return 15; if (v<80) return 16; return 18;
  }
  function hrPts(v){
    if (v===null) return 0;
    if (v<40) return 11; if (v<70) return 2; if (v<120) return 0; if (v<160) return 4; return 7;
  }
  function sbpPts(v){
    if (v===null) return 0;
    if (v<70) return 13; if (v<100) return 5; if (v<200) return 0; return 2;
  }
  function tempPts(v){
    if (v===null) return 0;
    return v>=39 ? 3 : 0;
  }
  function oxPts(){
    if (!ventilated) return 0;
    const pao2 = num('pao2'), fio2 = num('fio2');
    if (pao2===null || fio2===null || fio2<=0) return 0;
    const ratio = pao2/fio2;
    if (ratio<100) return 11; if (ratio<200) return 9; return 6;
  }
  function urinePts(v){
    if (v===null) return 0;
    if (v<0.5) return 11; if (v<1.0) return 4; return 0;
  }
  function ureaPts(v){
    if (v===null) return 0;
    if (v<28) return 0; if (v<84) return 6; return 10;
  }
  function wbcPts(v){
    if (v===null) return 0;
    if (v<1.0) return 12; if (v<20.0) return 0; return 3;
  }
  function kPts(v){
    if (v===null) return 0;
    if (v<3.0) return 3; if (v<5.0) return 0; return 3;
  }
  function naPts(v){
    if (v===null) return 0;
    if (v<125) return 5; if (v<145) return 0; return 1;
  }
  function hco3Pts(v){
    if (v===null) return 0;
    if (v<15) return 6; if (v<20) return 3; return 0;
  }
  function biliPts(v){
    if (v===null) return 0;
    if (v<4.0) return 0; if (v<6.0) return 4; return 9;
  }
  function gcsPts(v){
    if (v===null) return 0;
    if (v<6) return 26; if (v<9) return 13; if (v<11) return 7; if (v<14) return 5; return 0;
  }
  function admissionPts(){
    if (admission==='scheduled') return 0;
    if (admission==='medical') return 6;
    return 8; // unscheduled
  }
  function chronicPts(){
    if (chronic==='metastasis') return 9;
    if (chronic==='hema') return 10;
    if (chronic==='aids') return 17;
    return 0;
  }

  function compute(){
    const pAge = agePts(num('age')); chip('pts-age', pAge);
    const pHr = hrPts(num('hr')); chip('pts-hr', pHr);
    const pSbp = sbpPts(num('sbp')); chip('pts-sbp', pSbp);
    const pTemp = tempPts(num('temp')); chip('pts-temp', pTemp);
    const pOx = oxPts(); chip('pts-ox', pOx);
    const pUrine = urinePts(num('urine')); chip('pts-urine', pUrine);
    const pUrea = ureaPts(num('urea')); chip('pts-urea', pUrea);
    const pWbc = wbcPts(num('wbc')); chip('pts-wbc', pWbc);
    const pK = kPts(num('k')); chip('pts-k', pK);
    const pNa = naPts(num('na')); chip('pts-na', pNa);
    const pHco3 = hco3Pts(num('hco3')); chip('pts-hco3', pHco3);
    const pBili = biliPts(num('bili')); chip('pts-bili', pBili);
    const pGcs = gcsPts(num('gcs')); chip('pts-gcs', pGcs);
    const pAdmission = admissionPts(); chip('pts-admission', pAdmission);
    const pChronic = chronicPts(); chip('pts-chronic', pChronic);

    document.getElementById('field-pao2').style.opacity = ventilated ? '1' : '0.45';
    document.getElementById('field-fio2').style.opacity = ventilated ? '1' : '0.45';

    const total = pAge+pHr+pSbp+pTemp+pOx+pUrine+pUrea+pWbc+pK+pNa+pHco3+pBili+pGcs+pAdmission+pChronic;
    document.getElementById('out-total').textContent = total;

    // Ecuación logística oficial publicada (Le Gall et al., JAMA 1993)
    const mortEl = document.getElementById('out-mortality');
    if (num('age')!==null && num('gcs')!==null) {
      const logit = -7.7631 + 0.0737*total + 0.9971*Math.log(total+1);
      const prob = Math.exp(logit) / (1+Math.exp(logit));
      mortEl.textContent = (prob*100).toFixed(1) + '%';
    } else {
      mortEl.textContent = '—';
    }
  }

  document.querySelectorAll('input').forEach(i=>i.addEventListener('input', compute));
  compute();
})();
</script>
</body>
</html>
