<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora APACHE II</title>
<style>
  :root {
    --bg: #f6f8f9;
    --panel: #ffffff;
    --line: #e2e8ec;
    --ink: #1c2b33;
    --ink-soft: #5b6b73;
    --accent: #0e7c86;
    --accent-soft: #e4f3f4;
    --danger: #b3403a;
    --danger-soft: #fbeceb;
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: 32px 16px 80px;
  }
  .wrap { max-width: 960px; margin: 0 auto; }

  header.top {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 8px;
  }
  header.top h1 {
    font-size: 22px;
    font-weight: 600;
    margin: 0;
    letter-spacing: -0.2px;
  }
  header.top p {
    margin: 0;
    font-size: 13px;
    color: var(--ink-soft);
  }

  /* Panel de resultado - el "hero" */
  .result-bar {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 20px 24px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 20px;
    margin-bottom: 28px;
    position: sticky;
    top: 12px;
    z-index: 5;
    box-shadow: 0 1px 3px rgba(20,40,45,0.06);
  }
  .result-item .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--ink-soft);
    margin-bottom: 4px;
  }
  .result-item .value {
    font-size: 28px;
    font-weight: 600;
    color: var(--accent);
    line-height: 1;
  }
  .result-item.mortality .value { color: var(--danger); }

  .section {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    margin-bottom: 16px;
    overflow: hidden;
  }
  .section h2 {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--ink-soft);
    margin: 0;
    padding: 12px 18px;
    border-bottom: 1px solid var(--line);
    background: #fbfcfd;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
  }
  .field {
    padding: 14px 18px;
    border-right: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
  }
  .field label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 8px;
  }
  .field .hint {
    font-size: 11px;
    color: var(--ink-soft);
    font-weight: 400;
    display: block;
    margin-top: 2px;
  }
  .row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  input, select {
    width: 100%;
    font-size: 14px;
    padding: 8px 10px;
    border: 1px solid #d3dade;
    border-radius: 7px;
    background: #fff;
    color: var(--ink);
    font-family: inherit;
  }
  input:focus, select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .points-chip {
    min-width: 30px;
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 8px;
    border-radius: 6px;
    background: #eef1f2;
    color: var(--ink-soft);
    white-space: nowrap;
  }
  .points-chip.active {
    background: var(--accent-soft);
    color: var(--accent);
  }
  .points-chip.high {
    background: var(--danger-soft);
    color: var(--danger);
  }

  .toggle-row {
    display: flex;
    gap: 6px;
    margin-top: 8px;
  }
  .toggle-row button {
    flex: 1;
    font-size: 12px;
    padding: 6px 4px;
    border-radius: 6px;
    border: 1px solid #d3dade;
    background: #fff;
    color: var(--ink-soft);
    cursor: pointer;
  }
  .toggle-row button.selected {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  footer.actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 8px;
  }
  footer.actions button {
    font-size: 13px;
    padding: 9px 18px;
    border-radius: 7px;
    border: 1px solid #d3dade;
    background: #fff;
    color: var(--ink);
    cursor: pointer;
  }
  footer.actions button:hover { background: #f1f4f5; }

  @media (max-width: 560px) {
    .field { border-right: none; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <div>
      <h1>Score APACHE II</h1>
      <p>Acute Physiology and Chronic Health Evaluation II</p>
    </div>
  </header>

  <div class="result-bar">
    <div class="result-item">
      <div class="label">Physiology score</div>
      <div class="value" id="out-aps">0</div>
    </div>
    <div class="result-item">
      <div class="label">APACHE II total</div>
      <div class="value" id="out-total">0</div>
    </div>
    <div class="result-item mortality">
      <div class="label">Mortalidad estimada</div>
      <div class="value" id="out-mortality">—</div>
    </div>
  </div>

  <div class="section">
    <h2>Signos vitales</h2>
    <div class="grid">
      <div class="field">
        <label>Temperatura (rectal, °C)</label>
        <div class="row">
          <input type="number" step="0.1" id="temp" placeholder="37.0">
          <div class="points-chip" id="pts-temp">0</div>
        </div>
      </div>
      <div class="field">
        <label>Tensión arterial media (mmHg)</label>
        <div class="row">
          <input type="number" id="map" placeholder="80">
          <div class="points-chip" id="pts-map">0</div>
        </div>
      </div>
      <div class="field">
        <label>Frecuencia cardiaca (lpm)</label>
        <div class="row">
          <input type="number" id="hr" placeholder="80">
          <div class="points-chip" id="pts-hr">0</div>
        </div>
      </div>
      <div class="field">
        <label>Frecuencia respiratoria (rpm)</label>
        <div class="row">
          <input type="number" id="rr" placeholder="16">
          <div class="points-chip" id="pts-rr">0</div>
        </div>
      </div>
    </div>
  </div>

  <div class="section">
    <h2>Oxigenación y equilibrio ácido-base</h2>
    <div class="grid">
      <div class="field">
        <label>FiO2
          <span class="hint">Determina si se usa A-aDO2 o PaO2</span>
        </label>
        <div class="toggle-row" id="fio2-toggle">
          <button data-v="low" class="selected">FiO2 &lt; 0.5</button>
          <button data-v="high">FiO2 ≥ 0.5</button>
        </div>
      </div>
      <div class="field" id="field-paO2">
        <label>PaO2 (mmHg)</label>
        <div class="row">
          <input type="number" id="pao2" placeholder="90">
          <div class="points-chip" id="pts-ox">0</div>
        </div>
      </div>
      <div class="field" id="field-aado2" style="display:none;">
        <label>A-aDO2 (mmHg)</label>
        <div class="row">
          <input type="number" id="aado2" placeholder="150">
          <div class="points-chip" id="pts-ox2">0</div>
        </div>
      </div>
      <div class="field">
        <label>pH arterial
          <span class="hint">Si no hay gasometría, usa bicarbonato</span>
        </label>
        <div class="row">
          <input type="number" step="0.01" id="ph" placeholder="7.40">
          <div class="points-chip" id="pts-ph">0</div>
        </div>
      </div>
      <div class="field">
        <label>Bicarbonato venoso (mmol/L)
          <span class="hint">Solo si no hay pH disponible</span>
        </label>
        <div class="row">
          <input type="number" step="0.1" id="hco3" placeholder="24">
          <div class="points-chip" id="pts-hco3">0</div>
        </div>
      </div>
    </div>
  </div>

  <div class="section">
    <h2>Bioquímica y hematología</h2>
    <div class="grid">
      <div class="field">
        <label>Sodio (mmol/L)</label>
        <div class="row">
          <input type="number" id="na" placeholder="140">
          <div class="points-chip" id="pts-na">0</div>
        </div>
      </div>
      <div class="field">
        <label>Potasio (mmol/L)</label>
        <div class="row">
          <input type="number" step="0.1" id="k" placeholder="4.0">
          <div class="points-chip" id="pts-k">0</div>
        </div>
      </div>
      <div class="field">
        <label>Creatinina (mg/dL)
          <span class="hint">Se duplica el punteo si hay fracaso renal agudo</span>
        </label>
        <div class="row">
          <input type="number" step="0.1" id="creat" placeholder="1.0">
          <div class="points-chip" id="pts-creat">0</div>
        </div>
        <div class="toggle-row" id="arf-toggle">
          <button data-v="0" class="selected">Sin FRA</button>
          <button data-v="1">Con FRA</button>
        </div>
      </div>
      <div class="field">
        <label>Hematocrito (%)</label>
        <div class="row">
          <input type="number" step="0.1" id="hct" placeholder="40">
          <div class="points-chip" id="pts-hct">0</div>
        </div>
      </div>
      <div class="field">
        <label>Leucocitos (x1000/mm³)</label>
        <div class="row">
          <input type="number" step="0.1" id="wbc" placeholder="8">
          <div class="points-chip" id="pts-wbc">0</div>
        </div>
      </div>
    </div>
  </div>

  <div class="section">
    <h2>Neurológico, edad y comorbilidad</h2>
    <div class="grid">
      <div class="field">
        <label>Escala de Glasgow (GCS)</label>
        <div class="row">
          <input type="number" min="3" max="15" id="gcs" placeholder="15">
          <div class="points-chip" id="pts-gcs">0</div>
        </div>
      </div>
      <div class="field">
        <label>Edad (años)</label>
        <div class="row">
          <input type="number" id="age" placeholder="60">
          <div class="points-chip" id="pts-age">0</div>
        </div>
      </div>
      <div class="field">
        <label>Insuficiencia orgánica crónica grave o inmunosupresión</label>
        <div class="toggle-row" id="chronic-toggle">
          <button data-v="none" class="selected">No</button>
          <button data-v="emergency">Sí, ingreso urgente</button>
          <button data-v="elective">Sí, postop. electivo</button>
        </div>
        <div class="row" style="margin-top:8px; justify-content:flex-end;">
          <div class="points-chip" id="pts-chronic">0</div>
        </div>
      </div>
    </div>
  </div>

  <footer class="actions">
    <button id="reset-btn">Reiniciar</button>
  </footer>

</div>

<script>
(function(){
  const chip = (id, val, threshold) => {
    const el = document.getElementById(id);
    el.textContent = val;
    el.className = 'points-chip' + (val >= threshold ? (val >= 3 ? ' high' : ' active') : '');
  };

  function tempPts(v){
    if (v===null) return 0;
    if (v>=41) return 4; if (v>=39) return 3; if (v>=38.5) return 1;
    if (v>=36) return 0; if (v>=34) return 1; if (v>=32) return 2;
    if (v>=30) return 3; return 4;
  }
  function mapPts(v){
    if (v===null) return 0;
    if (v>=160) return 4; if (v>=130) return 3; if (v>=110) return 2;
    if (v>=70) return 0; if (v>=50) return 2; return 4;
  }
  function hrPts(v){
    if (v===null) return 0;
    if (v>=180) return 4; if (v>=140) return 3; if (v>=110) return 2;
    if (v>=70) return 0; if (v>=55) return 2; if (v>=40) return 3; return 4;
  }
  function rrPts(v){
    if (v===null) return 0;
    if (v>=50) return 4; if (v>=35) return 3; if (v>=25) return 1;
    if (v>=12) return 0; if (v>=10) return 1; if (v>=6) return 2; return 4;
  }
  function pao2Pts(v){
    if (v===null) return 0;
    if (v>70) return 0; if (v>=61) return 1; if (v>=55) return 3; return 4;
  }
  function aadoPts(v){
    if (v===null) return 0;
    if (v>=500) return 4; if (v>=350) return 3; if (v>=200) return 2; return 0;
  }
  function phPts(v){
    if (v===null) return null;
    if (v>=7.7) return 4; if (v>=7.6) return 3; if (v>=7.5) return 1;
    if (v>=7.33) return 0; if (v>=7.25) return 2; if (v>=7.15) return 3; return 4;
  }
  function hco3Pts(v){
    if (v===null) return 0;
    if (v>=52) return 4; if (v>=41) return 3; if (v>=32) return 1;
    if (v>=22) return 0; if (v>=18) return 2; if (v>=15) return 3; return 4;
  }
  function naPts(v){
    if (v===null) return 0;
    if (v>=180) return 4; if (v>=160) return 3; if (v>=155) return 2;
    if (v>=150) return 1; if (v>=130) return 0; if (v>=120) return 2;
    if (v>=111) return 3; return 4;
  }
  function kPts(v){
    if (v===null) return 0;
    if (v>=7) return 4; if (v>=6) return 3; if (v>=5.5) return 1;
    if (v>=3.5) return 0; if (v>=3) return 1; if (v>=2.5) return 2; return 4;
  }
  function creatPts(v, arf){
    if (v===null) return 0;
    let p;
    if (v>=3.5) p=4; else if (v>=2) p=3; else if (v>=1.5) p=2;
    else if (v>=0.6) p=0; else p=2;
    return arf ? p*2 : p;
  }
  function hctPts(v){
    if (v===null) return 0;
    if (v>=60) return 4; if (v>=50) return 2; if (v>=46) return 1;
    if (v>=30) return 0; if (v>=20) return 2; return 4;
  }
  function wbcPts(v){
    if (v===null) return 0;
    if (v>=40) return 4; if (v>=20) return 2; if (v>=15) return 1;
    if (v>=3) return 0; if (v>=1) return 2; return 4;
  }
  function agePts(v){
    if (v===null) return 0;
    if (v>=75) return 6; if (v>=65) return 5; if (v>=55) return 3;
    if (v>=45) return 2; return 0;
  }

  const num = id => {
    const v = document.getElementById(id).value;
    return v === '' ? null : parseFloat(v);
  };

  let fio2Mode = 'low';
  let arf = false;
  let chronic = 'none';

  document.getElementById('fio2-toggle').addEventListener('click', e=>{
    const btn = e.target.closest('button'); if(!btn) return;
    fio2Mode = btn.dataset.v;
    [...e.currentTarget.children].forEach(b=>b.classList.toggle('selected', b===btn));
    document.getElementById('field-paO2').style.display = fio2Mode==='low' ? '' : 'none';
    document.getElementById('field-aado2').style.display = fio2Mode==='high' ? '' : 'none';
    compute();
  });
  document.getElementById('arf-toggle').addEventListener('click', e=>{
    const btn = e.target.closest('button'); if(!btn) return;
    arf = btn.dataset.v === '1';
    [...e.currentTarget.children].forEach(b=>b.classList.toggle('selected', b===btn));
    compute();
  });
  document.getElementById('chronic-toggle').addEventListener('click', e=>{
    const btn = e.target.closest('button'); if(!btn) return;
    chronic = btn.dataset.v;
    [...e.currentTarget.children].forEach(b=>b.classList.toggle('selected', b===btn));
    compute();
  });
  document.getElementById('reset-btn').addEventListener('click', ()=>{
    document.querySelectorAll('input').forEach(i=>i.value='');
    fio2Mode='low'; arf=false; chronic='none';
    document.querySelectorAll('.toggle-row').forEach(row=>{
      [...row.children].forEach((b,i)=>b.classList.toggle('selected', i===0));
    });
    document.getElementById('field-paO2').style.display='';
    document.getElementById('field-aado2').style.display='none';
    compute();
  });

  function compute(){
    const temp = num('temp'), map = num('map'), hr = num('hr'), rr = num('rr');
    const pao2 = num('pao2'), aado2 = num('aado2');
    const ph = num('ph'), hco3 = num('hco3');
    const na = num('na'), k = num('k'), creat = num('creat');
    const hct = num('hct'), wbc = num('wbc'), gcsRaw = num('gcs'), age = num('age');

    const pTemp = tempPts(temp); chip('pts-temp', pTemp, 1);
    const pMap = mapPts(map); chip('pts-map', pMap, 1);
    const pHr = hrPts(hr); chip('pts-hr', pHr, 1);
    const pRr = rrPts(rr); chip('pts-rr', pRr, 1);

    let pOx = 0;
    if (fio2Mode === 'low') { pOx = pao2Pts(pao2); chip('pts-ox', pOx, 1); document.getElementById('pts-ox2').textContent='—'; }
    else { pOx = aadoPts(aado2); chip('pts-ox2', pOx, 1); document.getElementById('pts-ox').textContent='—'; }

    let pAcid = phPts(ph);
    if (pAcid === null) pAcid = hco3Pts(hco3);
    chip('pts-ph', phPts(ph) ?? 0, 1);
    chip('pts-hco3', hco3Pts(hco3), 1);

    const pNa = naPts(na); chip('pts-na', pNa, 1);
    const pK = kPts(k); chip('pts-k', pK, 1);
    const pCreat = creatPts(creat, arf); chip('pts-creat', pCreat, 1);
    const pHct = hctPts(hct); chip('pts-hct', pHct, 1);
    const pWbc = wbcPts(wbc); chip('pts-wbc', pWbc, 1);

    const gcsPts = gcsRaw===null ? 0 : (15 - gcsRaw);
    chip('pts-gcs', gcsPts, 1);

    const pAge = agePts(age); chip('pts-age', pAge, 1);

    let pChronic = 0;
    if (chronic === 'emergency') pChronic = 5;
    else if (chronic === 'elective') pChronic = 2;
    chip('pts-chronic', pChronic, 1);

    const aps = pTemp+pMap+pHr+pRr+pOx+pAcid+pNa+pK+pCreat+pHct+pWbc+gcsPts;
    const total = aps + pAge + pChronic;

    document.getElementById('out-aps').textContent = aps;
    document.getElementById('out-total').textContent = total;

    // Aproximación orientativa de mortalidad (curva logística clásica, no oficial)
    const hasEnoughData = temp!==null && map!==null && hr!==null && rr!==null && age!==null;
    const mortEl = document.getElementById('out-mortality');
    if (hasEnoughData) {
      const logit = -3.517 + (total * 0.146);
      const prob = 1 / (1 + Math.exp(-logit));
      mortEl.textContent = (prob*100).toFixed(1) + '%';
    } else {
      mortEl.textContent = '—';
    }
  }

  document.querySelectorAll('input').forEach(i=>i.addEventListener('input', compute));
  compute();
})();
</script>
</body>
</html>
